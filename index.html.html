<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tỏ tình 💖</title>

  <style>
    body {
      margin: 0;
      font-family: "Comic Sans MS", cursive;
      background: white;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #quiz, #result {
      text-align: center;
    }

    .hidden {
      display: none;
    }

    .cute {
      width: 200px;
      margin-bottom: 20px;
    }

    h1 {
      color: #ff4d6d;
      font-size: 26px;
    }

    .btn-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      position: relative;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    #yesBtn {
      background: #ff4d6d;
      color: white;
    }

    #yesBtn:hover {
      transform: scale(1.1);
    }

    #noBtn {
      background: #666;
      color: white;
      position: relative;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      animation: float 3s linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(-200px);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div id="quiz">
  <img 
    class="cute"
    src="https://i.giphy.com/media/5bdhq6YF0szPaCEk9Y/giphy.gif"
  />

  <h1 id="question">
    Mình có một câu hỏi nhỏ… cậu làm người yêu mình nhé? 💖
  </h1>

  <div class="btn-container">
    <button id="yesBtn">Yes 💕</button>
    <button id="noBtn">No 😭</button>
  </div>
</div>

<div id="result" class="hidden">
  <h1>Yayyyy 💖💖💖</h1>
  <p>Từ giờ cậu là của mình rồi nha 😏</p>
</div>

<script>
  const noBtn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");
  const question = document.getElementById("question");
  const quiz = document.getElementById("quiz");
  const result = document.getElementById("result");

  const texts = [
    "Thật luôn á? 😭",
    "Suy nghĩ lại đi mà 🥺",
    "Mình dễ thương vậy mà 😳",
    "Cho mình cơ hội nha 💕",
    "Không chọn mình là tiếc lắm đó 😏",
    "Cậu mà bấm No là mình buồn đó 😭",
    "Thôi màaa, thử yêu mình đi 💖",
    "Một lần thôi cũng được mà 🥺",
    "Mình hứa sẽ thương cậu 😚"
  ];

  // 😈 bấm No → chạy
  noBtn.addEventListener("click", () => {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    const randomText = texts[Math.floor(Math.random() * texts.length)];
    question.innerText = randomText;
  });

  // 💖 bấm Yes
  yesBtn.addEventListener("click", () => {
    quiz.classList.add("hidden");
    result.classList.remove("hidden");
    createHearts();
  });

  // 💕 tim bay
  function createHearts() {
    setInterval(() => {
      const heart = document.createElement("div");
      heart.innerText = "💖";
      heart.classList.add("heart");

      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.top = window.innerHeight + "px";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 3000);
    }, 200);
  }
</script>

</body>
</html>
